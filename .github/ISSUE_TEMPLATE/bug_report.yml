name: Bug Report
description: Report something that isn't working as expected
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: product
    attributes:
      label: Product
      options:
        - Website
        - API
        - Python SDK
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: System details
      description: If relevant, include browser, OS, SDK version, or other environment details.
      placeholder: e.g. Chrome 125, macOS 15, joescorner 1.0.0
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the issue.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information.
    validations:
      required: false
